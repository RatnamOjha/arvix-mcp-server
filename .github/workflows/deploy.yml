name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from GitHub UI

# Grant GITHUB_TOKEN permission to push to gh-pages branch
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Job 1: Run tests first ────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ || true   # non-blocking on first push

      - name: Run tests
        run: pytest tests/ -v --asyncio-mode=auto

  # ── Job 2: Deploy web/ to GitHub Pages ───────────────────────────────────
  deploy:
    name: Deploy Website
    needs: test          # only deploy if tests pass
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload web/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/        # only the web/ folder goes to Pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print deployed URL
        run: echo "Site live at ${{ steps.deployment.outputs.page_url }}"
